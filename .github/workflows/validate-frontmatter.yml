name: Validate Frontmatter

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill and prompt frontmatter
        shell: pwsh
        run: ./scripts/validate-frontmatter.ps1
